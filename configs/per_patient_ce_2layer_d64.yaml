# CE + 2-layer Conv2d at ORIGINAL d_shared=64
# Isolates the Conv2d effect: 80→664 params, everything else identical to CE baseline
# Conv2d(1,8,k=3)+ReLU+Conv2d(8,8,k=3)+ReLU → pool(2,4) → d_shared=64
# Conv1d(64,32,k=5,s=5) = 10K — SAME as CE baseline
# BiGRU(32,32,2L) = 37K — SAME as CE baseline
# Total ~48K (vs ~43K baseline) — only 664 more params
experiment: per_patient_ce_2layer_d64

model:
  readin_type: spatial_conv
  head_type: flat
  d_shared: 64               # C(8) * pool_h(2) * pool_w(4) = 64 — SAME
  hidden_size: 32              # SAME as CE baseline
  gru_layers: 2
  gru_dropout: 0.3
  temporal_stride: 5           # SAME as CE baseline
  num_classes: 10
  blank_bias: 0.0

  spatial_conv:
    channels: 8
    num_layers: 2              # 2-layer: the ONLY change
    kernel_size: 3
    pool_h: 2
    pool_w: 4

training:
  loss_type: ce
  ce_segments: 3

  stage1:
    epochs: 300
    lr: 1.0e-3
    warmup_epochs: 20
    readin_lr_mult: 3.0
    weight_decay: 1.0e-4
    batch_size: 16
    grad_clip: 5.0
    patience: 7
    eval_every: 10
    val_fraction: 0.2

  augmentation:
    time_shift_frames: 30
    amp_scale_std: 0.3
    channel_dropout_max: 0.2
    noise_frac: 0.05
    feat_dropout_max: 0.3
    time_mask_min: 2
    time_mask_max: 5
    spatial_cutout: false
    temporal_stretch: true
    temporal_stretch_max_rate: 0.15

evaluation:
  seeds: [42, 137, 256]
  cv_folds: 5
  primary_metric: per
