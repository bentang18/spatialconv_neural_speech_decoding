# Per-patient training config: smaller backbone + harder augmentation
# For single-patient CV (Sprint 3). Use default.yaml for cross-patient LOPO.
experiment: per_patient

model:
  readin_type: spatial_conv
  head_type: articulatory
  d_shared: 64          # read-in output dim (unchanged)
  hidden_size: 32       # GRU hidden — 4x smaller than LOPO config
  gru_layers: 2
  gru_dropout: 0.3      # higher dropout for small data
  temporal_stride: 10   # 200Hz → 20Hz (Spalding-validated, halves GRU seq length)
  num_classes: 10

  spatial_conv:
    channels: 8
    num_layers: 1
    kernel_size: 3
    pool_h: 2
    pool_w: 4

training:
  stage1:
    epochs: 200
    lr: 1.0e-3
    readin_lr_mult: 3.0
    weight_decay: 1.0e-4
    batch_size: 16
    grad_clip: 5.0
    patience: 7         # more patience (×10 = 70 epochs)
    eval_every: 10
    val_fraction: 0.2

  stage2:
    epochs: 100
    lr: 1.0e-3
    weight_decay: 1.0e-3
    source_replay_frac: 0.3
    patience: 10

  augmentation:
    time_shift_frames: 30       # ±150ms (was 20)
    amp_scale_std: 0.3          # 2x (was 0.15)
    channel_dropout_max: 0.4    # 2x (was 0.2)
    noise_frac: 0.05            # 2.5x (was 0.02)
    feat_dropout_max: 0.5       # ~1.7x (was 0.3)
    time_mask_min: 2
    time_mask_max: 6            # up from 4 — masks up to 300ms at 20Hz
    spatial_cutout: false
    temporal_stretch: true       # ±15% speaking rate variation
    temporal_stretch_max_rate: 0.15

evaluation:
  seeds: [42, 137, 256]
  cv_folds: 5
  primary_metric: per
