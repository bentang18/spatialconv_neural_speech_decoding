# Per-patient ablation: flat CTC head (no articulatory decomposition)
# Compare against per_patient.yaml (articulatory head) to test if
# the 6 sub-heads actually help.
experiment: per_patient_flat_head

model:
  readin_type: spatial_conv
  head_type: flat             # <-- ABLATION: flat Linear(128,10) instead of articulatory
  d_shared: 64
  hidden_size: 32
  gru_layers: 2
  gru_dropout: 0.3
  temporal_stride: 5
  num_classes: 10
  # blank_bias not used by flat head (no separate blank logit)

  spatial_conv:
    channels: 8
    num_layers: 1
    kernel_size: 3
    pool_h: 2
    pool_w: 4

training:
  stage1:
    epochs: 300
    lr: 1.0e-3
    warmup_epochs: 20
    readin_lr_mult: 3.0
    weight_decay: 1.0e-4
    batch_size: 16
    grad_clip: 5.0
    patience: 7
    eval_every: 10
    val_fraction: 0.2

  stage2:
    epochs: 100
    lr: 1.0e-3
    weight_decay: 1.0e-3
    source_replay_frac: 0.3
    patience: 10

  augmentation:
    time_shift_frames: 30
    amp_scale_std: 0.3
    channel_dropout_max: 0.2
    noise_frac: 0.05
    feat_dropout_max: 0.3
    time_mask_min: 3
    time_mask_max: 10
    spatial_cutout: false
    temporal_stretch: true
    temporal_stretch_max_rate: 0.15

evaluation:
  seeds: [42, 137, 256]
  cv_folds: 5
  primary_metric: per
