# LOPO smoke test config: small budget, one seed, full code path.
experiment: E2_lopo_smoke

model:
  readin_type: spatial_conv
  head_type: articulatory
  d_shared: 64
  hidden_size: 64
  gru_layers: 2
  gru_dropout: 0.2
  temporal_stride: 5
  num_classes: 10
  blank_bias: 2.0

  spatial_conv:
    channels: 8
    num_layers: 1
    kernel_size: 3
    pool_h: 2
    pool_w: 4

training:
  stage1:
    epochs: 5
    steps: 20
    lr: 1.0e-3
    warmup_epochs: 0
    readin_lr_mult: 3.0
    weight_decay: 1.0e-4
    batch_size: 8
    grad_clip: 5.0
    patience: 2
    eval_every: 5
    val_fraction: 0.2
    augmentation:
      time_shift_frames: 5
      amp_scale_std: 0.05
      channel_dropout_max: 0.05
      noise_frac: 0.01
      feat_dropout_max: 0.1
      time_mask_min: 2
      time_mask_max: 4
      spatial_cutout: false
      temporal_stretch: false

  stage2:
    epochs: 3
    steps: 10
    lr: 1.0e-3
    warmup_epochs: 0
    readin_lr_mult: 3.0
    weight_decay: 1.0e-3
    batch_size: 8
    grad_clip: 5.0
    source_replay_frac: 0.3
    patience: 2
    eval_every: 1
    cv_folds: 2
    val_fraction: 0.2
    min_outer_class_count: 2
    min_inner_class_count: 2
    augmentation:
      time_shift_frames: 5
      amp_scale_std: 0.05
      channel_dropout_max: 0.05
      noise_frac: 0.01
      feat_dropout_max: 0.1
      time_mask_min: 2
      time_mask_max: 4
      spatial_cutout: false
      temporal_stretch: false

  augmentation:
    time_shift_frames: 5
    amp_scale_std: 0.05
    channel_dropout_max: 0.05
    noise_frac: 0.01
    feat_dropout_max: 0.1
    time_mask_min: 2
    time_mask_max: 4

evaluation:
  seeds: [42]
  cv_folds: 2
  primary_metric: per
