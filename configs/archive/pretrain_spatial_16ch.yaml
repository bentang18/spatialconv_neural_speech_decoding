# Richer spatial encoder: 16-channel Conv2d (288 params vs 80 default)
# d_flat = 16 * 4 * 8 = 512 (vs 256 default)
spatial_mode: collapse
d: 64
gru_hidden: 32
gru_layers: 2
temporal_stride: 10

spatial_conv:
  channels: 16
  pool_h: 4
  pool_w: 8

mask_ratio: [0.4, 0.6]
mask_spans: [3, 6]
ema_momentum: 0.996
ema_momentum_end: 1.0
predictor_hidden: 256
