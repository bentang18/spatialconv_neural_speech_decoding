# CE + position-specific temporal attention
# Uses CEPositionHead: learned query per position attends to GRU frames
# Position 1 learns to attend to early frames, position 3 to late frames
# Replaces mean pooling (which mixes all phonemes equally)
# Same architecture as CE baseline otherwise — isolates attention effect
# Head: 1,545 params (384 queries + 1,161 classifier)
experiment: per_patient_ce_attn

model:
  readin_type: spatial_conv
  head_type: flat              # overridden by loss_type=ce_attn in trainer
  d_shared: 64                 # SAME as CE baseline
  hidden_size: 32              # SAME as CE baseline
  gru_layers: 2
  gru_dropout: 0.3
  temporal_stride: 5           # SAME as CE baseline
  num_classes: 10
  blank_bias: 0.0

  spatial_conv:
    channels: 8
    num_layers: 1
    kernel_size: 3
    pool_h: 2
    pool_w: 4

training:
  loss_type: ce_attn
  ce_segments: 3

  stage1:
    epochs: 300
    lr: 1.0e-3
    warmup_epochs: 20
    readin_lr_mult: 3.0
    weight_decay: 1.0e-4
    batch_size: 16
    grad_clip: 5.0
    patience: 7
    eval_every: 10
    val_fraction: 0.2

  augmentation:
    time_shift_frames: 30
    amp_scale_std: 0.3
    channel_dropout_max: 0.2
    noise_frac: 0.05
    feat_dropout_max: 0.3
    time_mask_min: 2
    time_mask_max: 5
    spatial_cutout: false
    temporal_stretch: true
    temporal_stretch_max_rate: 0.15

evaluation:
  seeds: [42, 137, 256]
  cv_folds: 5
  primary_metric: per
