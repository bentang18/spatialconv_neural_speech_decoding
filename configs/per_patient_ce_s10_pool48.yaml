# CE with less aggressive spatial pooling: pool(4,8) instead of pool(2,4)
# Run B: 4× more spatial resolution retained → d_shared=256
# Pool(4,8) on 8×16 grid = 4 row groups × 8 col groups = 32 spatial cells × 8 channels
# Each cell covers 2×2 electrodes (vs 4×4 before) — much finer spatial detail
experiment: per_patient_ce_s10_pool48

model:
  readin_type: spatial_conv
  head_type: flat
  d_shared: 256               # C(8) * pool_h(4) * pool_w(8) = 256
  hidden_size: 32
  gru_layers: 2
  gru_dropout: 0.3
  temporal_stride: 10
  num_classes: 10
  blank_bias: 0.0

  spatial_conv:
    channels: 8
    num_layers: 1
    kernel_size: 3
    pool_h: 4
    pool_w: 8

training:
  loss_type: ce
  ce_segments: 3

  stage1:
    epochs: 300
    lr: 1.0e-3
    warmup_epochs: 20
    readin_lr_mult: 3.0
    weight_decay: 1.0e-4
    batch_size: 16
    grad_clip: 5.0
    patience: 7
    eval_every: 10
    val_fraction: 0.2

  augmentation:
    time_shift_frames: 30
    amp_scale_std: 0.3
    channel_dropout_max: 0.2
    noise_frac: 0.05
    feat_dropout_max: 0.3
    time_mask_min: 2
    time_mask_max: 5
    spatial_cutout: false
    temporal_stretch: true
    temporal_stretch_max_rate: 0.15

evaluation:
  seeds: [42, 137, 256]
  cv_folds: 5
  primary_metric: per
