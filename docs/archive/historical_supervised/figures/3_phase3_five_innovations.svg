<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1420" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <filter id="shadow3" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="headerGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6A1B9A"/>
      <stop offset="100%" style="stop-color:#8E24AA"/>
    </linearGradient>
    <linearGradient id="sharedGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE7F6"/>
      <stop offset="100%" style="stop-color:#D1C4E9"/>
    </linearGradient>
    <linearGradient id="innovGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7B1FA2"/>
      <stop offset="100%" style="stop-color:#AB47BC"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="1420" rx="12" fill="#FAFBFC"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="960" height="70" rx="12" fill="url(#headerGrad3)"/>
  <rect x="0" y="40" width="960" height="30" fill="url(#headerGrad3)"/>
  <text x="480" y="32" text-anchor="middle" fill="white" font-size="22" font-weight="600">Phase 3 — Five Innovations (E2: Full Model)</text>
  <text x="480" y="56" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Spatial Conv + Reptile + SupCon + Articulatory CTC + DRO — all absent from neural speech BCI field</text>

  <!-- Color legend -->
  <rect x="30" y="85" width="14" height="14" rx="3" fill="#AB47BC"/>
  <text x="50" y="96" fill="#546E7A" font-size="11">Innovation (new)</text>
  <rect x="190" y="85" width="14" height="14" rx="3" fill="#F5A623"/>
  <text x="210" y="96" fill="#546E7A" font-size="11">Per-patient</text>
  <rect x="330" y="85" width="14" height="14" rx="3" fill="#50B860"/>
  <text x="350" y="96" fill="#546E7A" font-size="11">Shared (frozen Stage 2)</text>
  <rect x="540" y="85" width="14" height="14" rx="3" fill="#4A90D9"/>
  <text x="560" y="96" fill="#546E7A" font-size="11">Data</text>
  <rect x="630" y="85" width="14" height="14" rx="3" fill="#E74C3C"/>
  <text x="650" y="96" fill="#546E7A" font-size="11">Loss</text>

  <!-- ═══════════════ ARCHITECTURE FLOW ═══════════════ -->

  <!-- 1. Input -->
  <rect x="245" y="118" width="390" height="70" rx="10" fill="#4A90D9" filter="url(#shadow3)"/>
  <text x="440" y="145" text-anchor="middle" fill="white" font-size="15" font-weight="600">uECOG Grid  (2D spatial field)</text>
  <text x="440" y="166" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="12">(B, H, W, T)  —  native grid shape, 200 Hz</text>
  <text x="440" y="180" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">8×16 (128ch) or 12×22 (256ch)</text>

  <!-- Annotation: input change from Phase 2 -->
  <rect x="665" y="118" width="260" height="70" rx="8" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
  <text x="795" y="138" text-anchor="middle" fill="#6A1B9A" font-size="10" font-weight="600">CHANGED FROM PHASE 2</text>
  <text x="795" y="155" text-anchor="middle" fill="#546E7A" font-size="10">Grid-shaped input (H, W, T)</text>
  <text x="795" y="170" text-anchor="middle" fill="#546E7A" font-size="10">NOT flattened to (D_padded, T)</text>
  <text x="795" y="183" text-anchor="middle" fill="#546E7A" font-size="10">Spatial structure preserved</text>

  <!-- Augmentation box -->
  <rect x="30" y="125" width="195" height="95" rx="8" fill="#FFF8E1" stroke="#FFE082" stroke-width="1"/>
  <text x="127" y="144" text-anchor="middle" fill="#F57F17" font-size="10" font-weight="600">AUGMENTATION (same as P2)</text>
  <text x="127" y="161" text-anchor="middle" fill="#795548" font-size="10">Time shift ±100ms</text>
  <text x="127" y="174" text-anchor="middle" fill="#795548" font-size="10">Amp scale σ=0.15</text>
  <text x="127" y="187" text-anchor="middle" fill="#795548" font-size="10">Ch dropout p∈[0, 0.2]</text>
  <text x="127" y="200" text-anchor="middle" fill="#795548" font-size="10">Gaussian noise 2% RMS</text>

  <!-- Arrow -->
  <line x1="440" y1="188" x2="440" y2="218" stroke="#666" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- ═══════ INNOVATION 1: SPATIAL CONV ═══════ -->
  <rect x="195" y="222" width="490" height="105" rx="12" fill="none" stroke="#AB47BC" stroke-width="2.5"/>

  <!-- Innovation badge -->
  <rect x="195" y="210" width="120" height="22" rx="11" fill="#AB47BC"/>
  <text x="255" y="225" text-anchor="middle" fill="white" font-size="11" font-weight="700">INNOVATION 1</text>

  <!-- Spatial Conv block -->
  <rect x="215" y="240" width="450" height="75" rx="10" fill="url(#innovGrad)" filter="url(#shadow3)"/>
  <text x="440" y="264" text-anchor="middle" fill="white" font-size="15" font-weight="600">Per-Patient Spatial Conv2d</text>
  <text x="440" y="284" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="12">Conv2d(1, 8, k=3, pad=1) + ReLU → AdaptiveAvgPool2d(2,4) → flatten</text>
  <text x="440" y="302" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12">80 params  (167× fewer than Linear's 13,376)</text>

  <!-- Annotation: spatial conv details -->
  <rect x="665" y="235" width="260" height="90" rx="8" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
  <text x="795" y="255" text-anchor="middle" fill="#6A1B9A" font-size="10" font-weight="600">REPLACES Linear(208, 64)</text>
  <text x="795" y="272" text-anchor="middle" fill="#546E7A" font-size="10">Treats each timepoint as 2D image</text>
  <text x="795" y="285" text-anchor="middle" fill="#546E7A" font-size="10">AdaptivePool → fixed 64-dim output</text>
  <text x="795" y="298" text-anchor="middle" fill="#546E7A" font-size="10">Per-patient (array orientation varies)</text>
  <text x="795" y="311" text-anchor="middle" fill="#546E7A" font-size="10">Reptile meta-learned initialization</text>

  <!-- Why badge -->
  <rect x="30" y="252" width="155" height="55" rx="8" fill="#EDE7F6" stroke="#B39DDB" stroke-width="1"/>
  <text x="107" y="270" text-anchor="middle" fill="#4A148C" font-size="10" font-weight="600">WHY?</text>
  <text x="107" y="285" text-anchor="middle" fill="#546E7A" font-size="10">uECOG IS a 2D spatial</text>
  <text x="107" y="298" text-anchor="middle" fill="#546E7A" font-size="10">field — treat it as video</text>

  <!-- Arrow -->
  <line x1="440" y1="327" x2="440" y2="355" stroke="#666" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- ═══════ SHARED BACKBONE (same as Phase 2) ═══════ -->
  <rect x="170" y="358" width="540" height="268" rx="12" fill="url(#sharedGrad3)" stroke="#9575CD" stroke-width="2"/>
  <text x="185" y="378" fill="#4A148C" font-size="11" font-weight="600">SHARED BACKBONE  (~147k params — unchanged from Phase 2)</text>
  <text x="185" y="392" fill="#7E57C2" font-size="10">Frozen during Stage 2</text>

  <!-- LayerNorm -->
  <rect x="235" y="404" width="410" height="38" rx="8" fill="#66BB6A" filter="url(#shadow3)"/>
  <text x="440" y="428" text-anchor="middle" fill="white" font-size="14" font-weight="600">LayerNorm(64)</text>

  <!-- Arrow -->
  <line x1="440" y1="442" x2="440" y2="458" stroke="#666" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <!-- Conv1d -->
  <rect x="235" y="462" width="410" height="48" rx="8" fill="#43A047" filter="url(#shadow3)"/>
  <text x="440" y="483" text-anchor="middle" fill="white" font-size="14" font-weight="600">Conv1d(64, 64, k=5, s=5) + GELU</text>
  <text x="440" y="501" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="12">200 Hz → 40 Hz  (20,544 params)</text>

  <!-- Arrow -->
  <line x1="440" y1="510" x2="440" y2="526" stroke="#666" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <!-- BiGRU -->
  <rect x="235" y="530" width="410" height="48" rx="8" fill="#2E7D32" filter="url(#shadow3)"/>
  <text x="440" y="551" text-anchor="middle" fill="white" font-size="14" font-weight="600">BiGRU(64, 64, 2 layers, bidir)</text>
  <text x="440" y="569" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="12">124,416 params → (B, 40, 128)</text>

  <!-- Backbone annotations -->
  <rect x="665" y="380" width="260" height="60" rx="8" fill="#E8F5E9" stroke="#C8E6C9" stroke-width="1"/>
  <text x="795" y="398" text-anchor="middle" fill="#2E7D32" font-size="10" font-weight="600">UNCHANGED FROM PHASE 2</text>
  <text x="795" y="413" text-anchor="middle" fill="#546E7A" font-size="10">LN → Conv1d → BiGRU identical</text>
  <text x="795" y="428" text-anchor="middle" fill="#546E7A" font-size="10">Same 146k shared params</text>

  <!-- SupCon branch from backbone -->
  <rect x="665" y="490" width="260" height="98" rx="8" fill="none" stroke="#AB47BC" stroke-width="2"/>
  <rect x="665" y="478" width="120" height="22" rx="11" fill="#AB47BC"/>
  <text x="725" y="493" text-anchor="middle" fill="white" font-size="11" font-weight="700">INNOVATION 3</text>
  <rect x="680" y="508" width="230" height="68" rx="6" fill="#F3E5F5"/>
  <text x="795" y="526" text-anchor="middle" fill="#6A1B9A" font-size="12" font-weight="600">SupCon Loss (periodic)</text>
  <text x="795" y="542" text-anchor="middle" fill="#546E7A" font-size="10">Time-pool GRU → trial embeddings</text>
  <text x="795" y="555" text-anchor="middle" fill="#546E7A" font-size="10">Cross-patient contrastive, λ=0.1</text>
  <text x="795" y="568" text-anchor="middle" fill="#546E7A" font-size="10">Every 10 meta-steps, τ=0.1</text>

  <!-- Dashed line from BiGRU to SupCon -->
  <line x1="645" y1="554" x2="680" y2="545" stroke="#AB47BC" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- End shared backbone -->

  <!-- Arrow out of backbone -->
  <line x1="440" y1="626" x2="440" y2="652" stroke="#666" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- ═══════ INNOVATION 4: ARTICULATORY CTC HEAD ═══════ -->
  <rect x="170" y="656" width="540" height="175" rx="12" fill="none" stroke="#AB47BC" stroke-width="2.5"/>

  <!-- Innovation badge -->
  <rect x="170" y="644" width="120" height="22" rx="11" fill="#AB47BC"/>
  <text x="230" y="659" text-anchor="middle" fill="white" font-size="11" font-weight="700">INNOVATION 4</text>

  <!-- Articulatory head -->
  <rect x="195" y="675" width="490" height="145" rx="10" fill="url(#innovGrad)" filter="url(#shadow3)"/>
  <text x="440" y="700" text-anchor="middle" fill="white" font-size="15" font-weight="600">Articulatory CTC Head</text>

  <!-- 6 feature heads -->
  <rect x="215" y="712" width="68" height="32" rx="5" fill="rgba(255,255,255,0.2)"/>
  <text x="249" y="732" text-anchor="middle" fill="white" font-size="9" font-weight="600">C/V (2)</text>

  <rect x="293" y="712" width="68" height="32" rx="5" fill="rgba(255,255,255,0.2)"/>
  <text x="327" y="732" text-anchor="middle" fill="white" font-size="9" font-weight="600">Place (3)</text>

  <rect x="371" y="712" width="68" height="32" rx="5" fill="rgba(255,255,255,0.2)"/>
  <text x="405" y="732" text-anchor="middle" fill="white" font-size="9" font-weight="600">Manner (2)</text>

  <rect x="449" y="712" width="68" height="32" rx="5" fill="rgba(255,255,255,0.2)"/>
  <text x="483" y="732" text-anchor="middle" fill="white" font-size="9" font-weight="600">Voice (2)</text>

  <rect x="527" y="712" width="68" height="32" rx="5" fill="rgba(255,255,255,0.2)"/>
  <text x="561" y="732" text-anchor="middle" fill="white" font-size="9" font-weight="600">Height (3)</text>

  <rect x="605" y="712" width="68" height="32" rx="5" fill="rgba(255,255,255,0.2)"/>
  <text x="639" y="732" text-anchor="middle" fill="white" font-size="9" font-weight="600">Back (3)</text>

  <!-- Arrow down to composition -->
  <text x="440" y="762" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">↓  6 heads → 15 features  ↓</text>

  <!-- Composition matrix -->
  <rect x="295" y="772" width="290" height="38" rx="6" fill="rgba(255,255,255,0.25)"/>
  <text x="440" y="790" text-anchor="middle" fill="white" font-size="13" font-weight="600">× Fixed Matrix A  (9×15)</text>
  <text x="440" y="806" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">0 learned params in composition</text>

  <!-- Annotation: art head details -->
  <rect x="665" y="660" width="260" height="170" rx="8" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
  <text x="795" y="680" text-anchor="middle" fill="#6A1B9A" font-size="10" font-weight="600">REPLACES Flat Linear(128, 10)</text>
  <text x="795" y="698" text-anchor="middle" fill="#546E7A" font-size="10">6 parallel articulatory heads</text>
  <text x="795" y="713" text-anchor="middle" fill="#546E7A" font-size="10">→ 15 feature scores</text>
  <text x="795" y="728" text-anchor="middle" fill="#546E7A" font-size="10">→ fixed A → 9 phoneme logits</text>
  <text x="795" y="748" text-anchor="middle" fill="#546E7A" font-size="10">/b/ vs /p/ = voicing score only</text>
  <text x="795" y="763" text-anchor="middle" fill="#546E7A" font-size="10">Model MUST learn voicing</text>
  <line x1="680" y1="775" x2="910" y2="775" stroke="#E1BEE7" stroke-width="1"/>
  <text x="795" y="793" text-anchor="middle" fill="#546E7A" font-size="10">2,064 params (vs 1,290 flat)</text>
  <text x="795" y="808" text-anchor="middle" fill="#546E7A" font-size="10">+ blank head: Linear(128, 1)</text>
  <text x="795" y="823" text-anchor="middle" fill="#4A148C" font-size="10" font-weight="600">Decodes what motor cortex</text>

  <!-- Why badge -->
  <rect x="30" y="700" width="155" height="68" rx="8" fill="#EDE7F6" stroke="#B39DDB" stroke-width="1"/>
  <text x="107" y="718" text-anchor="middle" fill="#4A148C" font-size="10" font-weight="600">WHY?</text>
  <text x="107" y="733" text-anchor="middle" fill="#546E7A" font-size="10">Motor cortex encodes</text>
  <text x="107" y="746" text-anchor="middle" fill="#546E7A" font-size="10">articulatory gestures,</text>
  <text x="107" y="759" text-anchor="middle" fill="#546E7A" font-size="10">NOT phoneme categories</text>

  <!-- Arrow to loss -->
  <line x1="440" y1="831" x2="440" y2="856" stroke="#666" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- 9 phoneme logits + blank -->
  <rect x="280" y="860" width="320" height="40" rx="8" fill="#E74C3C" filter="url(#shadow3)"/>
  <text x="440" y="885" text-anchor="middle" fill="white" font-size="14" font-weight="600">log_softmax → 9 phonemes + blank</text>

  <!-- Arrow to CTC -->
  <line x1="440" y1="900" x2="440" y2="920" stroke="#666" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- CTC Loss -->
  <rect x="310" y="925" width="260" height="45" rx="22" fill="#C62828" filter="url(#shadow3)"/>
  <text x="440" y="953" text-anchor="middle" fill="white" font-size="15" font-weight="600">CTC Loss</text>

  <!-- ═══════════════ TRAINING INNOVATIONS ═══════════════ -->

  <rect x="30" y="1000" width="900" height="400" rx="10" fill="white" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="480" y="1025" text-anchor="middle" fill="#333" font-size="16" font-weight="700">Training Loop: Reptile + SupCon + DRO</text>

  <!-- Innovation 2: Reptile -->
  <rect x="50" y="1042" width="420" height="170" rx="8" fill="none" stroke="#AB47BC" stroke-width="2"/>
  <rect x="50" y="1030" width="120" height="22" rx="11" fill="#AB47BC"/>
  <text x="110" y="1045" text-anchor="middle" fill="white" font-size="11" font-weight="700">INNOVATION 2</text>

  <rect x="60" y="1052" width="400" height="148" rx="6" fill="#F3E5F5"/>
  <text x="260" y="1072" text-anchor="middle" fill="#4A148C" font-size="13" font-weight="700">Reptile Meta-Learning (outer loop)</text>
  <text x="260" y="1092" text-anchor="middle" fill="#546E7A" font-size="11">Replaces standard multi-patient SGD</text>
  <line x1="80" y1="1100" x2="440" y2="1100" stroke="#CE93D8" stroke-width="1"/>
  <text x="75" y="1118" fill="#546E7A" font-size="11">for meta_step in 5000:</text>
  <text x="90" y="1136" fill="#546E7A" font-size="11">  θ₀ ← current params</text>
  <text x="90" y="1152" fill="#546E7A" font-size="11">  p ← DRO-sample patient</text>
  <text x="90" y="1168" fill="#546E7A" font-size="11">  θ_K ← K=5 inner SGD steps on p</text>
  <text x="90" y="1184" fill="#546E7A" font-size="11">  θ₀ += ε·(θ_K − θ₀)   <tspan fill="#7B1FA2" font-size="10">[move toward adaptable init]</tspan></text>

  <!-- Annotation: Reptile rationale -->
  <rect x="30" y="1218" width="200" height="45" rx="6" fill="#EDE7F6" stroke="#B39DDB" stroke-width="1"/>
  <text x="130" y="1236" text-anchor="middle" fill="#4A148C" font-size="10" font-weight="600">WHY REPTILE?</text>
  <text x="130" y="1251" text-anchor="middle" fill="#546E7A" font-size="10">Optimize for adaptability, not accuracy</text>

  <!-- Innovation 5: DRO -->
  <rect x="490" y="1042" width="420" height="170" rx="8" fill="none" stroke="#AB47BC" stroke-width="2"/>
  <rect x="490" y="1030" width="120" height="22" rx="11" fill="#AB47BC"/>
  <text x="550" y="1045" text-anchor="middle" fill="white" font-size="11" font-weight="700">INNOVATION 5</text>

  <rect x="500" y="1052" width="400" height="148" rx="6" fill="#F3E5F5"/>
  <text x="700" y="1072" text-anchor="middle" fill="#4A148C" font-size="13" font-weight="700">DRO (patient sampling)</text>
  <text x="700" y="1092" text-anchor="middle" fill="#546E7A" font-size="11">Replaces uniform patient weighting</text>
  <line x1="520" y1="1100" x2="880" y2="1100" stroke="#CE93D8" stroke-width="1"/>
  <text x="515" y="1118" fill="#546E7A" font-size="11">Hard patients sampled more often:</text>
  <text x="530" y="1138" fill="#546E7A" font-size="11">w(p) ∝ softmax(loss(p) / τ)</text>
  <text x="530" y="1156" fill="#546E7A" font-size="11">τ = 1.0 (soft), clamp ≤ 3× uniform</text>
  <text x="530" y="1174" fill="#546E7A" font-size="11">Running EMA (α=0.1) of inner loss</text>
  <text x="530" y="1192" fill="#546E7A" font-size="11">Expects S3 (46 trials) / S5 (63ch)</text>
  <text x="530" y="1208" fill="#7B1FA2" font-size="10">→ proxy for unseen target patient</text>

  <!-- Annotation: DRO rationale -->
  <rect x="730" y="1218" width="200" height="45" rx="6" fill="#EDE7F6" stroke="#B39DDB" stroke-width="1"/>
  <text x="830" y="1236" text-anchor="middle" fill="#4A148C" font-size="10" font-weight="600">WHY DRO?</text>
  <text x="830" y="1251" text-anchor="middle" fill="#546E7A" font-size="10">Optimize worst-case, not average</text>

  <!-- Stage 2 comparison bar -->
  <rect x="50" y="1275" width="860" height="110" rx="8" fill="#ECEFF1"/>
  <text x="480" y="1300" text-anchor="middle" fill="#37474F" font-size="14" font-weight="700">Stage 2: Target Adaptation Comparison</text>

  <!-- Phase 2 stage 2 -->
  <rect x="70" y="1312" width="400" height="60" rx="6" fill="white" stroke="#C8E6C9" stroke-width="1.5"/>
  <text x="270" y="1332" text-anchor="middle" fill="#546E7A" font-size="12" font-weight="600">Phase 2 (E1)</text>
  <text x="270" y="1350" text-anchor="middle" fill="#888" font-size="11">Adapt: Linear + LN + flat head</text>
  <text x="270" y="1365" text-anchor="middle" fill="#C62828" font-size="12" font-weight="700">14,794 trainable params</text>

  <!-- Phase 3 stage 2 -->
  <rect x="490" y="1312" width="400" height="60" rx="6" fill="white" stroke="#CE93D8" stroke-width="2"/>
  <text x="690" y="1332" text-anchor="middle" fill="#6A1B9A" font-size="12" font-weight="600">Phase 3 (E2)</text>
  <text x="690" y="1350" text-anchor="middle" fill="#888" font-size="11">Adapt: SpatialConv + LN + art head</text>
  <text x="690" y="1365" text-anchor="middle" fill="#6A1B9A" font-size="12" font-weight="700">2,272 trainable params (6.5× fewer)</text>

  <!-- Arrow between them -->
  <text x="480" y="1348" text-anchor="middle" fill="#AB47BC" font-size="18" font-weight="700">→</text>

</svg>